name: Build installers

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis,msi
            artifact: windows-x64
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --bundles appimage,deb
            artifact: linux-x64
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifact: macos-aarch64
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            artifact: macos-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Python for the Windows portable bundle
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          args: ${{ matrix.args }}
          releaseAssetNamePattern: Flowlet_[version]_[platform]_[arch][setup][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: flowlet-${{ matrix.artifact }}-[bundle]
          uploadUpdaterJson: false

      - name: Build Windows portable ZIP
        if: runner.os == 'Windows'
        run: npm run tauri:portable

      - name: Upload Windows portable workflow artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: flowlet-windows-x64-portable
          path: src-tauri/target/release/bundle/portable/*.zip
          if-no-files-found: error

      - name: Upload Windows portable ZIP to the GitHub Release
        if: runner.os == 'Windows' && github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" src-tauri/target/release/bundle/portable/*.zip --clobber
