services:
  flowlet:
    build: .
    container_name: flowlet
    restart: unless-stopped
    ports:
      - "18640:18640"
      - "8080:8080"
    volumes:
      - flowlet-data:/data
    environment:
      - FLOWLET_BIND_ADDR=0.0.0.0:18640
      - FLOWLET_WEB_ADDR=0.0.0.0:8080
      - FLOWLET_DB_PATH=/data/flowlet.sqlite
      - FLOWLET_ADMIN_TOKEN=${FLOWLET_ADMIN_TOKEN:-}
      - RUST_LOG=info

volumes:
  flowlet-data:
    driver: local
